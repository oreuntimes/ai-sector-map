<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 파생 섹터맵 | OREUN</title>
<style>
:root{--bg:#0a0f1f;--line:#1e2a4a;--gold:#d4af37;--ink:#e9eef9;--muted:#93a0c0}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,system-ui,sans-serif;
  color:var(--ink);display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:11px;padding:9px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.brand{color:var(--gold);font-weight:800;letter-spacing:1px}
.ttl{font-size:14px}
.grp{display:flex;gap:7px;align-items:center;padding-left:6px;border-left:1px solid var(--line)}
.lbl{font-size:10.5px;color:var(--muted);letter-spacing:.5px}
.tab{padding:6px 12px;border:1px solid var(--line);border-radius:8px;cursor:pointer;color:#aab6d6;
  font-size:12.5px;line-height:1.12;text-align:left;transition:.15s}
.tab small{display:block;font-size:9.5px;opacity:.75;font-weight:400;margin-top:1px}
.tab:hover{border-color:var(--gold)}
.tab.on{background:var(--gold);color:#0a0f1f;border-color:var(--gold);font-weight:700}
.ig{padding:6px 11px;border:1px solid var(--line);border-radius:8px;color:#aab6d6;font-size:12.5px;text-decoration:none;transition:.15s}
.ig:hover{border-color:var(--gold);color:var(--ink)}
.desc{color:var(--muted);font-size:12px;margin-left:auto;max-width:38%}
iframe{flex:1;width:100%;border:0;background:var(--bg)}
.foot{padding:6px 18px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center}
@media(max-width:820px){.desc{display:none}}
</style>
</head>
<body>
<div class="bar">
  <span class="brand">OREUN</span><span class="ttl">AI 파생 섹터맵</span>
  <div class="grp"><span class="lbl">MAP</span>
    <div class="tab on" data-src="map.html" data-d="중앙 AI에서 사방으로 파생 — 관계·전이를 직관적으로 보는 브레인스토밍 뷰">A 방사형<small>브레인스토밍</small></div>
    <div class="tab" data-src="map-tree.html" data-d="좌→우 계층 트리 — 정보 밀도와 A4 인쇄에 최적">B 트리<small>인쇄·계층</small></div>
    <div class="tab" data-src="map-grid.html" data-d="섹터 카드 대시보드 — 7개 가지를 한눈에 스캔">C 그리드<small>대시보드</small></div>
  </div>
  <div class="grp"><span class="lbl">발행</span>
    <a class="ig" href="infographics/pipeline_2page.html" target="_blank">파이프라인 2p ↗</a>
    <a class="ig" href="infographics/thememap.html" target="_blank">테마맵 ↗</a>
    <a class="ig" href="infographics/tujinsa.html" target="_blank">압축맵 ↗</a>
  </div>
  <span class="desc" id="desc">중앙 AI에서 사방으로 파생 — 관계·전이를 직관적으로 보는 브레인스토밍 뷰</span>
</div>
<iframe id="view" src="map.html" title="AI 파생 섹터맵 뷰"></iframe>
<div class="foot">본 자료는 정보 제공 목적이며 투자 권유가 아닙니다 · 데이터 2026-06-03(KST) 기준 · 한국 관련주 98종목 웹 검증 · © OREUN Research</div>
<script>
const tabs=document.querySelectorAll('.tab'),view=document.getElementById('view'),desc=document.getElementById('desc');
tabs.forEach(t=>t.addEventListener('click',()=>{
  tabs.forEach(x=>x.classList.remove('on'));t.classList.add('on');
  view.src=t.dataset.src;desc.textContent=t.dataset.d;
}));
</script>
</body>
</html>
