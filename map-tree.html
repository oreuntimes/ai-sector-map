<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 파생 섹터 수평 트리 | OREUN</title>
<style>
:root{
  --bg:#0a0f1f; --bg2:#0e1730; --line:#1e2a4a;
  --gold:#d4af37; --gold2:#caa83c; --ink:#e9eef9; --muted:#93a0c0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,system-ui,sans-serif;
  background:radial-gradient(circle at 26% 14%, #12193c 0%, #0a0f1f 64%);
  color:var(--ink);min-height:100vh;}
header{padding:16px 28px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
header h1{font-size:20px;letter-spacing:.3px}
header .badge{color:var(--gold);font-weight:800;letter-spacing:1px}
header .sub{color:var(--muted);font-size:13px}
.wrap{display:flex;height:calc(100vh - 60px)}
@media(max-width:980px){.wrap{flex-direction:column;height:auto}}

/* ===== Tree stage ===== */
#stage{flex:1 1 58%;position:relative;min-width:0;overflow:auto;padding:18px 14px 18px 6px}
.tree{position:relative;display:grid;grid-template-columns:200px 1fr;gap:0;align-items:center;min-height:660px}
#links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
#links path{fill:none}

/* root node */
.rootcol{display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.root{width:172px;border:2px solid var(--gold);border-radius:16px;
  background:radial-gradient(circle at 50% 30%,#1d2b5a 0%,#0c1430 100%);
  box-shadow:0 0 22px rgba(212,175,55,.32);padding:18px 14px;text-align:center;cursor:pointer;
  transition:filter .18s}
.root:hover{filter:brightness(1.1)}
.root .rk{color:var(--gold);font-size:32px;font-weight:800;letter-spacing:1px;line-height:1}
.root .rs{color:#c3cde6;font-size:11.5px;font-weight:500;margin-top:5px}
.root .rn{color:var(--muted);font-size:10.5px;margin-top:8px;border-top:1px solid var(--line);padding-top:7px}

/* branch column */
.branches{display:flex;flex-direction:column;gap:11px;position:relative;z-index:1;padding-left:30px}
.branch{border:1.8px solid var(--bc);border-radius:13px;background:#0e1730;
  padding:10px 14px;cursor:pointer;transition:filter .16s,box-shadow .16s;position:relative}
.branch:hover{filter:brightness(1.1);box-shadow:0 0 9px rgba(212,175,55,.3)}
.branch.sel{box-shadow:0 0 0 2px var(--bc),0 0 13px rgba(212,175,55,.4)}
.branch.hidden{border-style:dashed}
.branch .row1{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.branch .bname{font-size:15px;font-weight:800;color:var(--bc)}
.branch .bmeta{font-size:11px;color:var(--muted);font-style:italic}
.branch .bcount{margin-left:auto;font-size:10.5px;color:#aeb9d6;font-weight:600;white-space:nowrap}
.branch .bcount .hid{color:#e8b84b}
.branch .preview{font-size:11.5px;color:#c2cce4;margin-top:5px;line-height:1.4}
.branch .preview b{color:var(--bc);font-weight:700}
.branch .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bc);margin-right:1px;vertical-align:middle}

/* ===== Detail panel ===== */
#panel{flex:0 0 42%;max-width:560px;border-left:1px solid var(--line);
  background:rgba(8,13,28,.66);padding:22px 24px;overflow-y:auto}
@media(max-width:980px){#panel{max-width:none;border-left:none;border-top:1px solid var(--line);height:auto}}
#panel .ph{color:var(--muted);font-size:12.5px;margin-bottom:8px;letter-spacing:.3px}
#panel h2{font-size:23px;margin-bottom:4px;line-height:1.2}
#panel .meta{font-size:14px;margin-bottom:12px;font-style:italic}
.tier{display:inline-block;font-size:11px;padding:2px 10px;border:1px solid var(--gold);
  color:var(--gold);border-radius:20px;margin-bottom:6px}
#panel h3{font-size:12px;color:var(--gold2);text-transform:uppercase;letter-spacing:.7px;
  margin:18px 0 7px;border-bottom:1px solid var(--line);padding-bottom:5px}
#panel p{font-size:14px;line-height:1.66;color:#d7dff2}
table{width:100%;border-collapse:collapse;margin-top:4px;font-size:13px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
td.nm{font-weight:700;white-space:nowrap}
td.tk{color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap;font-size:12.5px}
td.ro{color:#c2cce4;font-size:12.5px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{font-size:12px;padding:3px 10px;background:#14203f;border:1px solid var(--line);
  border-radius:20px;color:#aebbdc}
.note{color:#e8b84b;font-size:12px;margin-top:16px;line-height:1.55;
  background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.25);border-radius:8px;padding:10px 12px}
.legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin:14px 2px 2px;padding-top:12px;border-top:1px solid var(--line)}
.legend .lg{font-size:11px;color:#aab6d6;display:flex;align-items:center;gap:5px}
.legend .dot{width:9px;height:9px;border-radius:50%}
.legend .dash{width:14px;height:0;border-top:2px dashed #93a0c0}

/* ===== Print (A4 landscape) ===== */
@media print{
  @page{size:A4 landscape;margin:8mm}
  body{background:#0a0f1f;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  header{padding:8px 14px}
  .wrap{display:block;height:auto}
  #stage{overflow:visible;padding:8px 6px}
  .tree{min-height:0}
  .branches{gap:7px}
  .branch{break-inside:avoid;padding:7px 11px}
  #panel{display:none}
  .legend{margin-top:10px}
}
</style>
</head>
<body>
<header>
  <h1><span class="badge">OREUN</span>&nbsp; AI 파생 섹터 수평 트리</h1>
  <span class="sub">AI 진앙 → 7개 파생 가지 · 한국 관련주 98 (검증완료) · 2026-06-03 기준</span>
</header>
<div class="wrap">
  <div id="stage">
    <div class="tree" id="tree">
      <svg id="links"></svg>
      <div class="rootcol">
        <div class="root" id="root">
          <div class="rk">AI</div>
          <div class="rs">생성형 · 에이전틱</div>
          <div class="rn">7개 파생 가지 · 98종목</div>
        </div>
      </div>
      <div class="branches" id="branches"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <aside id="panel"></aside>
</div>
<script src="data.js"></script>
<script>
const cat = SECTOR_DATA.categories[0];
const nodes = cat.children;
const N = nodes.length;
const colors=["#d4af37","#ef8b3c","#37c3c3","#5b8cf0","#3fbf73","#a878e6","#e5607a"];
const order={high:0,medium:1,low:2,unverified:3};

const branchesEl=document.getElementById('branches');
const linksEl=document.getElementById('links');
const panel=document.getElementById('panel');
const treeEl=document.getElementById('tree');
const rootEl=document.getElementById('root');

function shortName(s){return s.split('(')[0].trim();}
function metaph(s){const m=s.match(/\(([^)]+)\)/);return m?m[1]:'';}
function hi(n){return n.koreanStocks.filter(s=>s.confidence==='high');}
function hidCount(n){return n.koreanStocks.filter(s=>s.confidence==='low'||!s.ticker).length;}
function tierTxt(t){return t===1?'1차 · 직접 파생':(t===2?'2차 파생':'히든 · 먼 파생');}
function topHigh(n){
  const t=hi(n).filter(s=>s.ticker).slice(0,2);
  if(t.length) return t.map(s=>`<b>${s.name}</b>`).join(' · ');
  return n.koreanStocks[0]?`<b>${n.koreanStocks[0].name}</b>`:'—';
}

// ---- build branch cards ----
nodes.forEach((n,i)=>{
  const hidden=(n.tier||1)>=3;
  const c=colors[i];
  const hc=hidCount(n);
  const d=document.createElement('div');
  d.className='branch'+(hidden?' hidden':'');
  d.dataset.i=i;
  d.style.setProperty('--bc',c);
  d.innerHTML=`
    <div class="row1">
      <span class="dot"></span>
      <span class="bname">${shortName(n.sector)}</span>
      <span class="bmeta">${metaph(n.sector)}</span>
      <span class="bcount">${n.koreanStocks.length}종목${hc?` · <span class="hid">주의 ${hc}</span>`:''}</span>
    </div>
    <div class="preview">대표 ${topHigh(n)}</div>`;
  d.addEventListener('click',()=>show(i));
  branchesEl.appendChild(d);
});

// ---- draw connector paths (root -> each branch) ----
function drawLinks(){
  const tr=treeEl.getBoundingClientRect();
  linksEl.setAttribute('viewBox',`0 0 ${tr.width} ${tr.height}`);
  const rb=rootEl.getBoundingClientRect();
  const sx=rb.right-tr.left, sy=rb.top+rb.height/2-tr.top;
  let paths='';
  branchesEl.querySelectorAll('.branch').forEach((b,i)=>{
    const bb=b.getBoundingClientRect();
    const ex=bb.left-tr.left, ey=bb.top+bb.height/2-tr.top;
    const mx=sx+(ex-sx)*0.55;
    const hidden=(nodes[i].tier||1)>=3;
    paths+=`<path d="M${sx} ${sy} C${mx} ${sy} ${mx} ${ey} ${ex} ${ey}" `
      +`stroke="${colors[i]}" stroke-width="2" stroke-opacity="0.55"`
      +(hidden?' stroke-dasharray="5 3"':'')+`/>`;
  });
  linksEl.innerHTML=paths;
}

// ---- legend ----
document.getElementById('legend').innerHTML=nodes.map((n,i)=>
  `<span class="lg"><span class="dot" style="background:${colors[i]}"></span>${shortName(n.sector)}</span>`).join('')
  +`<span class="lg"><span class="dash"></span>히든·먼 파생(점선)</span>`;

function markSel(i){branchesEl.querySelectorAll('.branch').forEach(b=>b.classList.toggle('sel',+b.dataset.i===i));}

function show(i){
  markSel(i);
  const n=nodes[i];
  const stocks=[...n.koreanStocks].sort((a,b)=>(order[a.confidence]??9)-(order[b.confidence]??9));
  const rows=stocks.map(s=>{
    const code=s.ticker?s.ticker:(s.market||'비상장');
    const low=s.confidence==='low', un=!s.ticker;
    const mark=low?' <span title="AI 직접연관 약함 — 검증 주의" style="color:#e8b84b">⚠</span>':'';
    const dim=(low||un)?' style="opacity:.62"':'';
    const cs=un?' style="color:#93a0c0;font-style:italic"':'';
    return `<tr${dim}><td class="nm">${s.name}${mark}</td><td class="tk"${cs}>${code}</td><td class="ro">${s.role}</td></tr>`;
  }).join('');
  const chips=(n.globalPlayers||[]).map(g=>`<span class="chip">${g}</span>`).join('');
  panel.innerHTML=`
    <div class="ph">AI 파생 가지 ${i+1} / ${N}</div>
    <h2 style="color:${colors[i]}">${shortName(n.sector)}</h2>
    <div class="meta" style="color:${colors[i]}">${metaph(n.sector)}</div>
    <span class="tier" style="border-color:${colors[i]};color:${colors[i]}">${tierTxt(n.tier)}</span>
    <h3>왜 AI에서 파생되는가 (Narrative)</h3><p>${n.narrative}</p>
    ${n.hiddenMomentum?`<h3>히든 모멘텀</h3><p>${n.hiddenMomentum}</p>`:''}
    <h3>한국 관련주 (${n.koreanStocks.length})</h3>
    <table><tr><th>종목</th><th>코드</th><th>역할</th></tr>${rows}</table>
    <h3>글로벌 플레이어</h3><div class="chips">${chips}</div>`;
  panel.scrollTop=0;
}
function overview(){
  markSel(-1);
  const list=nodes.map((n,i)=>
    `<tr><td class="nm" style="color:${colors[i]};cursor:pointer" onclick="show(${i})">${shortName(n.sector)}</td><td class="tk">${n.koreanStocks.length}개</td><td class="ro">${metaph(n.sector)}</td></tr>`).join('');
  panel.innerHTML=`
    <div class="ph">전체 구조 · OVERVIEW</div>
    <h2 style="color:var(--gold)">AI 파생 수평 트리</h2>
    <div class="meta" style="color:var(--gold)">생성형·에이전틱 AI 진앙 → 7개 파생 가지</div>
    <h3>통합 내러티브</h3><p>${cat.summary}</p>
    <h3>7개 파생 가지 (클릭)</h3>
    <table><tr><th>가지</th><th>종목</th><th>은유</th></tr>${list}</table>
    <div class="note">✓ 98종목 웹 검증 완료 (high 65 / medium 27 / low 6). 코드 정정: 케이엔솔→053080. 비상장: 한화세미텍·리벨리온. 폐지: HD현대인프라코어. <span style="color:#e8b84b">⚠</span> 표시는 AI 직접연관이 약한 종목으로, 발행 콘텐츠에서는 제외를 권장합니다.</div>`;
}

rootEl.addEventListener('click',overview);
overview();

// links need layout-dependent geometry → draw after paint + on resize
function redraw(){requestAnimationFrame(drawLinks);}
window.addEventListener('load',redraw);
window.addEventListener('resize',redraw);
redraw();
</script>
</body>
</html>
